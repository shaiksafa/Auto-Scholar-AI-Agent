<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<header>
    <h1>🎓 Auto Scholar – AI Agent</h1>
</header>

<main>
    <h2>Student Registration</h2>

    <form action="/register" method="POST">

        <label>Full Name</label><br>
        <input type="text" name="name" placeholder="Enter your full name" required><br><br>

        <label>Email</label><br>
        <input type="email" name="email" placeholder="Enter your email" required><br><br>

        <label>Phone Number</label><br>
        <input type="tel" name="phone" placeholder="Enter your phone number" required><br><br>

        <label>Gender</label><br>
        <select name="gender" required>
            <option value="">Select Gender</option>
            <option>Male</option>
            <option>Female</option>
            <option>Other</option>
        </select><br><br>

        <label>State</label><br>
        <input type="text" name="state" placeholder="Enter your state" required><br><br>

        <label>College Name</label><br>
        <input type="text" name="college" placeholder="Enter your college name" required><br><br>

        <label>Course</label><br>
        <input type="text" name="course" placeholder="Enter your course" required><br><br>

        <label>Percentage / CGPA</label><br>
        <input type="number" name="percentage" placeholder="Enter your percentage" required><br><br>

        <label>Family Income (₹)</label><br>
        <input type="number" name="income" placeholder="Enter annual family income" required><br><br>

        <label>Category</label><br>
        <select name="category" required>
            <option value="">Select Category</option>
            <option>General</option>
            <option>OBC</option>
            <option>SC</option>
            <option>ST</option>
            <option>EWS</option>
        </select><br><br>

        <button type="submit">Submit</button>

    </form>

</main>

<footer>
    <p>© 2026 Auto Scholar AI Agent | B.Tech AI Project</p>
</footer>

</body>
</html>
